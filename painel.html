  .gkey{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;}

  .sigr{display:flex;justify-content:space-between;align-items:center;}
  .sigb{font-size:13px;font-weight:800;padding:3px 11px;border-radius:5px;letter-spacing:.06em;border:.5px solid;}
  .bbtn{background:transparent;border:.5px solid var(--brd);border-radius:5px;padding:5px 0;cursor:pointer;font-size:11px;color:var(--txt2);font-weight:600;width:100%;transition:all .15s;font-family:inherit;letter-spacing:.04em;}

  .bsh{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
  .bslbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
  .bsbdy{font-size:13px;color:#c3c3c3;line-height:1.7;}

  .sdot{width:7px;height:7px;border-radius:50%;transition:background .3s;flex-shrink:0;}
  .badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.05em;border:.5px solid;}

  .cdfg{height:100%;background:var(--gold);border-radius:1px;transition:width 1s linear;}

  #status-bar.err{border-color:rgba(178,46,50,.3);color:#ffb4b8;}
  #status-bar.warn{border-color:rgba(255,169,64,.3);color:#ffa940;}

#ativo-modal{display:none;position:fixed;inset:0;background:rgba(20,20,20,.90);z-index:9000;overflow-y:auto;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}

.mo-box{background:#282828;border:1px solid rgba(255,255,255,.18);border-radius:14px;width:100%;max-width:1100px;animation:moSlide .22s ease}

.mo-mac{background:#333333;border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:14px}

.mo-ld{padding:40px;text-align:center;color:#a3a3a3;font-size:13px}

.mo-blt{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.mo-risk{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.rk-val{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:16px;font-weight:700;color:#fafafa}

.oc-row:first-child{border-top:0}
.oc-row.oc-whale{background:rgba(255,106,0,.14);border-left:3px solid #ff6a00}
.oc-buy{color:#47b717;font-weight:700}
.oc-sell{color:#ffb4b8;font-weight:700}

.oc-t{color:#606060;font-family:ui-monospace,'SF Mono',Menlo,monospace}

.oc-logrow:first-child{border-top:0}

async function cgFetch(url, attempt = 0) {

async function pfetch(rawUrl, attempt = 0) {
  if (attempt >= PROXIES.length) throw new Error("Todos os proxies falharam — tente desativar Brave Shields para este site");
  const url = PROXIES[attempt](rawUrl);
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(12000) });

// INDICATORS
// ════════════════════════════════════════════════
function calcRSI(closes, p = 14) {
  if (!closes || closes.length < p + 1) return null;
  const c = closes.slice(-p - 1);
  let g = 0, l = 0;
  for (let i = 1; i <= p; i++) {
    const d = c[i] - c[i-1];
    if (d > 0) g += d; else l -= d;
  }
  const ag = g / p, al = l / p;
  if (al === 0) return 100;
  return Math.round(100 - 100 / (1 + ag / al));
}

function srFromCloses(closes) {
  if (!closes || closes.length < 5) return { support:[0,0], resistance:[0,0] };
  const r5  = closes.slice(-5);
  const r21 = closes.slice(-Math.min(21, closes.length));
  return {
    support:    [Math.min(...r5),  Math.min(...r21)],
    resistance: [Math.max(...r5),  Math.max(...r21)],
  };
}

// ════════════════════════════════════════════════
// METRICS — EMA / Hamming / Format helpers
// ════════════════════════════════════════════════
function mEma(v,n){const k=2/(n+1);let e=v[0];const o=[e];for(let i=1;i<v.length;i++){e=v[i]*k+e*(1-k);o.push(e);}return o;}
function mHamming(v,n=10){const w=[];let s=0;for(let i=0;i<n;i++){const x=0.54-0.46*Math.cos(2*Math.PI*i/(n-1));w.push(x);s+=x;}
  for(let i=0;i<n;i++)w[i]/=s;const o=Array(v.length).fill(null);
  for(let i=n-1;i<v.length;i++){let a=0;for(let j=0;j<n;j++)a+=v[i-n+1+j]*w[j];o[i]=a;}return o;}
function mAtr(candles,n=14){
  const tr=[];
  for(let i=1;i<candles.length;i++){
    const hh=candles[i].h, ll=candles[i].l, pc=candles[i-1].c;
    tr.push(Math.max(hh-ll, Math.abs(hh-pc), Math.abs(ll-pc)));
  }
  if(tr.length<n)return null;
  let a=tr.slice(0,n).reduce((x,y)=>x+y,0)/n; // seed = SMA dos primeiros n
  for(let i=n;i<tr.length;i++)a=(a*(n-1)+tr[i])/n; // suavização de Wilder
  return a;
}
function f2m(x){
  if(x==null||isNaN(x))return"—";const n=parseFloat(x);
  if(n<1)return"$"+n.toFixed(4);if(n<100)return"$"+n.toFixed(2);
  return"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}

let ocState = null;          // estado do painel Birdeye (1 ativo por vez — modal é singleton)
let stockPressState = null;  // estado do painel de aproximação por candle (ações)

function fmtUsdOC(x){ if(x==null) return "—"; return "$"+x.toLocaleString("en-US",{minimumFractionDigits:x>=1000?0:2,maximumFractionDigits:x>=1000?0:2}); }
function shortAddrOC(a){ return a ? a.slice(0,4)+"…"+a.slice(-4) : "—"; }
function prettyDexOC(s){ return s ? s.replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase()) : "—"; }
function addrEqOC(a,b){
  if(!a||!b) return false;
  if(a.slice(0,2).toLowerCase()==="0x" && b.slice(0,2).toLowerCase()==="0x") return a.toLowerCase()===b.toLowerCase();
  return a===b;
}
function explorerTxUrl(chain,hash){
  const m={solana:"https://solscan.io/tx/",ethereum:"https://etherscan.io/tx/",bsc:"https://bscscan.com/tx/"};
  return (m[chain]||"#")+hash;
}
function setText(elId,txt){ const el=document.getElementById(elId); if(el) el.textContent=txt; }

function stopLivePanel(){
  if(ocState){ clearInterval(ocState.pollTimer); clearInterval(ocState.cdTimer); ocState=null; }
  if(stockPressState){ clearInterval(stockPressState.pollTimer); clearInterval(stockPressState.cdTimer); stockPressState=null; }
}

function logLivePanelAlert(id,msg){
  const logEl=document.getElementById("oc-log-"+id);
  if(!logEl) return;
  const empty=logEl.querySelector(".oc-empty"); if(empty) empty.remove();
  const now=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  const row=document.createElement("div");
  row.className="oc-logrow";
  row.innerHTML=`<span class="oc-t">${now}</span><span style="color:#ff6a00;font-weight:700;font-size:12px">DESESTRUTURAÇÃO</span><span style="font-size:12.5px;color:#c3c3c3">${msg}</span>`;
  logEl.prepend(row);
  while(logEl.children.length>30) logEl.removeChild(logEl.lastChild);
}

// ---- Birdeye (on-chain genuíno) ----
async function pullBirdeyeTxs(cfg){
  const url=`https://public-api.birdeye.so/defi/txs/token?address=${cfg.address}&offset=0&limit=20&tx_type=swap&sort_type=desc`;
  const r=await fetch(url,{headers:{"X-API-KEY":BIRDEYE_API_KEY,"x-chain":cfg.chain,"accept":"application/json"},cache:"no-store",signal:AbortSignal.timeout(11000)});
  if(!r.ok) throw new Error("HTTP "+r.status);
  const j=await r.json();
  if(!j||!j.data||!Array.isArray(j.data.items)) throw new Error("payload inesperado");
  return j.data.items;
}

function processBirdeyeTrade(state,item,cfg){
  const base=item.base||{}, quote=item.quote||{};
  let side=null;
  if(addrEqOC(base.address,cfg.address)) side=base;
  else if(addrEqOC(quote.address,cfg.address)) side=quote;
  else return;
  const px=side.price||side.nearestPrice||0;
  const qty=Math.abs(side.uiAmount||0);
  const usd=qty*px;
  if(!usd) return;
  const dir=(side.uiChangeAmount||0)<0?"sell":"buy";
  const time=new Date((item.blockUnixTime||0)*1000).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});

  let whale=false,mult=0;
  if(state.sizes.length>=OC_MIN_SAMPLE){
    const avg=state.sizes.reduce((a,b)=>a+b,0)/state.sizes.length;
    if(avg>0){ mult=usd/avg; if(mult>=OC_MULT) whale=true; }
  }
  state.sizes.push(usd); if(state.sizes.length>OC_WINDOW_N) state.sizes.shift();

  const st=state.stats;
  st.vol+=usd; st.count++;
  if(usd>st.max){ st.max=usd; st.maxDir=dir; }
  if(dir==="buy") st.buyVol+=usd; else st.sellVol+=usd;

  state.feed.unshift({time,dir,qty,usd,dex:item.source,hash:item.txHash,whale});
  if(state.feed.length>300) state.feed.pop();

  if(whale && !state.firstLoad){
    logLivePanelAlert(state.id,`${dir==="buy"?"Compra":"Venda"} institucional de ${fmtUsdOC(usd)} em ${cfg.symbol} — ${mult.toFixed(1)}x a média das últimas trades. DEX: ${prettyDexOC(item.source)}.`);
  }
}

function renderBirdeyePanel(state){
  const id=state.id;
  const feedEl=document.getElementById("oc-feed-"+id);
  if(feedEl){
    if(state.feed.length===0){
      feedEl.innerHTML='<div class="mo-ld" style="padding:14px">Esperando primeira leitura da Birdeye…</div>';
    }else{
      feedEl.innerHTML=state.feed.slice(0,40).map(t=>`
        <div class="oc-row${t.whale?" oc-whale":""}">
          <span class="oc-t">${t.time}</span>
          <span class="${t.dir==="buy"?"oc-buy":"oc-sell"}">${t.dir==="buy"?"COMPRA":"VENDA"}</span>
          <span class="num">${fmtUsdOC(t.usd)}</span>
          <span class="oc-dex">${prettyDexOC(t.dex)}</span>
          <span><a href="${explorerTxUrl(state.cfg.chain,t.hash)}" target="_blank" rel="noopener" style="color:#1a90ff">ver tx ↗</a></span>
        </div>`).join("");
    }
  }
  const st=state.stats;
  setText("oc-vol-"+id, fmtUsdOC(st.vol));
  setText("oc-count-"+id, st.count.toLocaleString("en-US"));
  setText("oc-avg-"+id, st.count?fmtUsdOC(st.vol/st.count):"—");
  const maxEl=document.getElementById("oc-max-"+id);
  if(maxEl){ maxEl.textContent=fmtUsdOC(st.max); maxEl.style.color=st.maxDir==="buy"?"#47b717":st.maxDir==="sell"?"#ffb4b8":""; }
  const tot=(st.buyVol+st.sellVol)||1, bp=Math.round(100*st.buyVol/tot), sp=100-bp;
  const buyEl=document.getElementById("oc-buy-"+id), sellEl=document.getElementById("oc-sell-"+id);
  if(buyEl){ buyEl.style.width=bp+"%"; buyEl.textContent=st.buyVol?bp+"%":""; }
  if(sellEl){ sellEl.style.width=sp+"%"; sellEl.textContent=st.sellVol?sp+"%":""; }
  setText("oc-buyn-"+id, fmtUsdOC(st.buyVol));
  setText("oc-selln-"+id, fmtUsdOC(st.sellVol));
  const biasEl=document.getElementById("oc-bias-"+id);
  if(biasEl) biasEl.innerHTML=bp>=sp?'<span style="color:#47b717">compradores no controle</span>':'<span style="color:#ffb4b8">vendedores no controle</span>';
}

function setOcConn(state,ok,msg){
  const dot=document.getElementById("oc-dot-"+state.id);
  if(dot) dot.style.background=ok?"#47b717":"#b22e32";
  setText("oc-connlbl-"+state.id, msg);
}

function startBirdeyePanel(id){
  stopLivePanel();
  const cfg=BIRDEYE_CFG[id]; if(!cfg) return;
  const state={ id, cfg, seen:new Set(), sizes:[], feed:[], stats:{vol:0,count:0,max:0,maxDir:null,buyVol:0,sellVol:0}, firstLoad:true, cd:OC_POLL_S };
  ocState=state;
  const tick=async()=>{
    if(ocState!==state) return;
    try{
      const items=await pullBirdeyeTxs(cfg);
      if(ocState!==state) return;
      const fresh=items.filter(it=>it.txHash&&!state.seen.has(it.txHash));
      fresh.reverse();
      fresh.forEach(it=>{ state.seen.add(it.txHash); processBirdeyeTrade(state,it,cfg); });
      if(state.seen.size>1000) state.seen=new Set(state.feed.map(t=>t.hash));
      renderBirdeyePanel(state);
      setOcConn(state,true,"ao vivo · Birdeye");
      const eb=document.getElementById("oc-err-"+id); if(eb) eb.style.display="none";
      state.firstLoad=false;
    }catch(e){
      if(ocState!==state) return;
      setOcConn(state,false,"sem conexão");
      const eb=document.getElementById("oc-err-"+id);
      if(eb){ eb.style.display="block"; eb.textContent="Não consegui falar com a Birdeye ("+e.message+"). Pode ser CORS (sirva por http://localhost) ou key expirada em bds.birdeye.so."; }
    }
  };
  tick();
  state.pollTimer=setInterval(tick,OC_POLL_S*1000);
  state.cdTimer=setInterval(()=>{
    if(ocState!==state) return;
    state.cd--; if(state.cd<=0) state.cd=OC_POLL_S;
    setText("oc-cd-"+id, state.cd);
  },1000);
}

// ---- Ações: aproximação via volume de candle de 1m (Yahoo Finance) ----
function processStockCandle(state,c){
  const dir=c.c>=c.o?"buy":"sell";
  const vol=c.v;
  let whale=false,mult=0;
  if(state.vols.length>=STOCK_MIN_SAMPLE){
    const avg=state.vols.reduce((a,b)=>a+b,0)/state.vols.length;
    if(avg>0){ mult=vol/avg; if(mult>=STOCK_MULT) whale=true; }
  }
  state.vols.push(vol); if(state.vols.length>STOCK_WINDOW_N) state.vols.shift();

  const st=state.stats;
  st.vol+=vol; st.count++;
  if(vol>st.max){ st.max=vol; st.maxDir=dir; }
  if(dir==="buy") st.buyVol+=vol; else st.sellVol+=vol;

  const time=c.t?new Date(c.t*1000).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"—";
  state.feed.unshift({time,dir,vol,close:c.c,whale,mult});
  if(state.feed.length>300) state.feed.pop();

  if(whale && !state.firstLoad){
    logLivePanelAlert(state.id,`Candle de 1m com volume ${mult.toFixed(1)}x a média (${fvol(vol)} ações, fechamento ${dir==="buy"?"em alta":"em baixa"} @ $${c.c.toFixed(2)}) — possível atividade institucional.`);
  }
}

function startStockPanel(id){
  stopLivePanel();
  const cfg=STOCK_CFG.find(c=>c.id===id); if(!cfg) return;
  const state={ id, sym:cfg.sym, seenTs:new Set(), vols:[], feed:[], stats:{vol:0,count:0,max:0,maxDir:null,buyVol:0,sellVol:0}, firstLoad:true, cd:STOCK_POLL_S };
  stockPressState=state;
  const tick=async()=>{
    if(stockPressState!==state) return;
    try{
      const candles=await fetchYF1m(cfg.sym);
      if(stockPressState!==state) return;
      const fresh=candles.filter(c=>c.t&&!state.seenTs.has(c.t));
      fresh.forEach(c=>{ state.seenTs.add(c.t); processStockCandle(state,c); });
      if(state.seenTs.size>3000) state.seenTs=new Set(state.feed.map(f=>f.ts).filter(Boolean));
      renderStockPanel(state);
      setStockConn(state,true,"ao vivo · Yahoo Finance");
      const eb=document.getElementById("oc-err-"+id); if(eb) eb.style.display="none";
      state.firstLoad=false;
    }catch(e){
      if(stockPressState!==state) return;
      setStockConn(state,false,"sem conexão");
      const eb=document.getElementById("oc-err-"+id);
      if(eb){ eb.style.display="block"; eb.textContent="Não consegui puxar candles de 1m da Yahoo ("+e.message+")."; }
    }
  };
  tick();
  state.pollTimer=setInterval(tick,STOCK_POLL_S*1000);
  state.cdTimer=setInterval(()=>{
    if(stockPressState!==state) return;
    state.cd--; if(state.cd<=0) state.cd=STOCK_POLL_S;
    setText("oc-cd-"+id, state.cd);
  },1000);
}

// METRICS — COMPUTE & RENDER
// ════════════════════════════════════════════════
function renderMetrics(id,panel,c15,c1h){
  const N=c15.length;
  if(N<30){panel.innerHTML='<div style="padding:10px;color:#a3a3a3;font-size:12px">Dados insuficientes para cálculo.</div>';return;}
  const closes15=c15.map(x=>x.c),lows15=c15.map(x=>x.l);
  const e9=mEma(closes15,9),e21=mEma(closes15,21),e50=mEma(closes15,50),ham=mHamming(closes15,10);
  const ci=N-2,live=closes15[N-1];
  const closes1h=c1h.map(x=>x.c);
  const e21h=mEma(closes1h,21),e50h=mEma(closes1h,50),last1h=closes1h.length-1;
  const win=lows15.slice(Math.max(0,ci-12),ci);
  const structLow=Math.min(...win);
  const reclaim=e21[ci],partial=Math.min(e9[ci],ham[ci]??e9[ci]),lastC=closes15[ci];

  let zone,beaconC,label,sub;
  if(lastC<structLow){
    zone="INVAL";beaconC="#b22e32";label="BAIXA / SHORT";
    sub=`Fechamento 15m ${f2m(lastC)} abaixo do suporte ${f2m(structLow)}. Próximo: EMA50 1h ${f2m(e50h[last1h])}.`;
  }else if(lastC>reclaim){
    zone="CONF";beaconC="#47b717";label="COMPRA CONFIRMADA";
    sub=`Fechamento 15m ${f2m(lastC)} acima da EMA21 (${f2m(reclaim)}). Reclaim confirmado — gatilho ativo.`;
  }else if(lastC>partial){
    zone="PART";beaconC="#ffa940";label="PARCIAL — AGUARDAR";
    sub=`Recuperou EMA9/Hamming (${f2m(partial)}) mas abaixo da EMA21 (${f2m(reclaim)}). Aguarde confirmação.`;
  }else{
    zone="WAIT";beaconC="#a3a3a3";label="AGUARDAR";
    sub=`Preço abaixo das médias. Confirmação acima de ${f2m(reclaim)}.`;
  }

  const slope6=e21h[last1h]-e21h[Math.max(0,last1h-6)];
  const pct6=slope6/(e21h[Math.max(0,last1h-6)]||1)*100;
  let rg,rgC;
  if(pct6<-0.6){rg="TENDÊNCIA DE BAIXA — Gate 1 ativo";rgC="#ffb4b8";}
  else if(pct6>0.6){rg="TENDÊNCIA DE ALTA — long válido";rgC="#47b717";}
  else{rg="LATERAL — reversão à média válida";rgC="#ffa940";}

  const l24=c1h.slice(-24);let bv=0,sv=0;
  l24.forEach(x=>{x.c>=x.o?bv+=x.v:sv+=x.v;});
  const tot=bv+sv||1,bp=Math.round(100*bv/tot),sp=100-bp;

  const rungs=[
    {lbl:"EMA21 15m (resistência)",val:reclaim,c:"#ffa940"},
    {lbl:"EMA9/Hamming 15m",val:partial,c:"#8b8bf0"},
    {lbl:"PREÇO AO VIVO",val:live,c:"#1a90ff"},
    {lbl:"Suporte estrutural",val:structLow,c:"#b22e32"},
    {lbl:"EMA50 1h (suporte forte)",val:e50h[last1h],c:"#47b717"},
  ].sort((a,b)=>b.val-a.val);
  const vals=rungs.map(r=>r.val),hi=Math.max(...vals),lo=Math.min(...vals),rng=(hi-lo)||1;
  const ladderHtml=rungs.map(r=>{
    const pos=((r.val-lo)/rng*100).toFixed(1);
    return`<div class="mRung"><span class="mRlbl">${r.lbl}</span><div class="mRbar"><i style="left:${pos}%;background:${r.c}"></i></div><span class="mRval" style="color:${txtR(r.c)}">${f2m(r.val)}</span></div>`;
  }).join("");

  // Atualiza badge de sinal
  const sigBtn=document.getElementById("sigb-"+id);
  if(sigBtn){
    const sc2=zone==="CONF"?SIG.LONG:zone==="INVAL"?SIG.SHORT:SIG.AGUARDAR;
    const lblMap={CONF:"COMPRA",INVAL:"SHORT",PART:"PARCIAL",WAIT:"AGUARDAR"};
    sigBtn.textContent=lblMap[zone]||"AGUARDAR";
    sigBtn.style.color=sc2.color;sigBtn.style.background=sc2.bg;sigBtn.style.borderColor=sc2.bd;
  }

  panel.innerHTML=`
<div class="mBeacon">
  <div class="mLight" style="background:${beaconC};box-shadow:0 0 0 6px ${beaconC}22,0 0 20px ${beaconC}55"></div>
  <div>
    <div style="font-size:15px;font-weight:800;color:${txtR(beaconC)};letter-spacing:.3px">${label}</div>
    <div style="font-size:12px;color:#a3a3a3;margin-top:4px;line-height:1.5">${sub}</div>
  </div>
</div>
<div class="mGrid">
  <div class="mCard">
    <div class="mCardH">Escada de Níveis</div>
    ${ladderHtml}
  </div>

const mLoaded={};

async function openMetrics(id){
  const modal=document.getElementById("ativo-modal");
  const cryptoCfg=CRYPTO_CFG.find(c=>c.id===id);
  const stockCfg=STOCK_CFG.find(c=>c.id===id);
  const cfg=cryptoCfg||stockCfg;
  if(!cfg)return;

  // Preencher header
  document.getElementById("mo-dot").style.background=cfg.color;
  document.getElementById("mo-nm").textContent=cfg.name;
  document.getElementById("mo-lb").textContent=(cfg.lbl||"").toUpperCase();
  const st=ST.assets[id]||{};
  const sc=SIG[st.signal]||SIG.AGUARDAR;
  document.getElementById("mo-sig").innerHTML=
    `<span style="font-size:12px;font-weight:700;color:${sc.color};background:${sc.bg};border:1px solid ${sc.bd};padding:3px 10px;border-radius:5px">${st.signal||"AGUARDAR"}</span>`;

  // Abrir modal com loading
  const moBody=document.getElementById("mo-body");
  moBody.innerHTML='<div class="mo-ld">⟳ Calculando métricas ao vivo...</div>';
  modal.classList.add("open");
  document.body.style.overflow="hidden";
  modal.onclick=e=>{if(e.target===modal)closeModal();};
  document.onkeydown=e=>{if(e.key==="Escape")closeModal();};

  // Se já carregado, só rerenderiza
  if(mLoaded[id]){
    const{c15,c1h,cD,funding,oi}=mLoaded[id];
    document.getElementById("mo-pr").textContent=f2m(c15[c15.length-1]?.c);
    renderModal(id,moBody,c15,c1h,st,cD,funding,oi,!!cryptoCfg);
    return;
  }

  try{
    let c15,c1h,cD=[],funding=null,oi=null;
    if(cryptoCfg){
      const[intraday,extra]=await Promise.all([
        fetchBybitCandles(cryptoCfg.bybitSym),
        fetchBybitExtra(cryptoCfg.bybitSym),
      ]);
      [c15,c1h]=intraday; cD=extra.cD; funding=extra.funding; oi=extra.oi;
    }else{
      const[intraday,daily]=await Promise.all([
        fetchYFIntraday(stockCfg.sym),
        fetchYFDaily(stockCfg.sym).catch(()=>[]),
      ]);
      [c15,c1h]=intraday; cD=daily;
    }
    mLoaded[id]={c15,c1h,cD,funding,oi};
    document.getElementById("mo-pr").textContent=f2m(c15[c15.length-1]?.c);
    renderModal(id,moBody,c15,c1h,st,cD,funding,oi,!!cryptoCfg);
  }catch(e){
    moBody.innerHTML=`<div class="mo-ld" style="color:#ffb4b8">⚠ Erro ao carregar: ${e.message}</div>`;
  }
}

function closeModal(){
  document.getElementById("ativo-modal").classList.remove("open");
  document.body.style.overflow="";
  document.onkeydown=null;
  stopLivePanel();
}

function renderModal(id,container,c15,c1h,st,cD,funding,oi,isCrypto){
  stopLivePanel();
  const N=c15.length;
  if(N<30){container.innerHTML='<div class="mo-ld">Dados insuficientes para cálculo.</div>';return;}
  const closes15=c15.map(x=>x.c),lows15=c15.map(x=>x.l);
  const e9=mEma(closes15,9),e21=mEma(closes15,21),e50=mEma(closes15,50),ham=mHamming(closes15,10);
  const ci=N-2,live=closes15[N-1];
  const closes1h=c1h.map(x=>x.c);
  const e21h=mEma(closes1h,21),e50h=mEma(closes1h,50),last1h=closes1h.length-1;
  const win=lows15.slice(Math.max(0,ci-12),ci);
  const structLow=Math.min(...win);
  const reclaim=e21[ci],partial=Math.min(e9[ci],ham[ci]??e9[ci]),lastC=closes15[ci];

  let zone,beaconC,label,sub;
  if(lastC<structLow){
    zone="INVAL";beaconC="#b22e32";label="BAIXA / SHORT";
    sub=`Fechamento 15m ${f2m(lastC)} abaixo do suporte estrutural ${f2m(structLow)}. Próximo suporte: EMA50·1h ${f2m(e50h[last1h])}.`;
  }else if(lastC>reclaim){
    zone="CONF";beaconC="#47b717";label="COMPRA CONFIRMADA";
    sub=`Fechamento 15m ${f2m(lastC)} acima da EMA21 (${f2m(reclaim)}). Reclaim confirmado — gatilho de entrada ativo.`;
  }else if(lastC>partial){
    zone="PART";beaconC="#ffa940";label="PARCIAL — AGUARDAR";
    sub=`Recuperou EMA9/Hamming (${f2m(partial)}) mas abaixo da EMA21 (${f2m(reclaim)}). Aguarde fechamento acima.`;
  }else{
    zone="WAIT";beaconC="#a3a3a3";label="AGUARDAR";
    sub=`Preço abaixo das médias-chave. Confirmação acima de ${f2m(reclaim)} (EMA21·15m).`;
  }

  // Atualiza sinal no botão do card
  const sigBtn=document.getElementById("sigb-"+id);
  if(sigBtn){
    const sc2=zone==="CONF"?SIG.LONG:zone==="INVAL"?SIG.SHORT:SIG.AGUARDAR;
    const lblMap={CONF:"COMPRA",INVAL:"SHORT",PART:"PARCIAL",WAIT:"AGUARDAR"};
    sigBtn.textContent=lblMap[zone]||"AGUARDAR";
    sigBtn.style.color=sc2.color;sigBtn.style.background=sc2.bg;sigBtn.style.borderColor=sc2.bd;
  }

  // Regime Gate 1
  const slope6=e21h[last1h]-e21h[Math.max(0,last1h-6)];
  const pct6=slope6/(e21h[Math.max(0,last1h-6)]||1)*100;
  let rg,rgC;
  if(pct6<-0.6){rg="TENDÊNCIA DE BAIXA — Gate 1 ativo";rgC="#ffb4b8";}
  else if(pct6>0.6){rg="TENDÊNCIA DE ALTA — long válido";rgC="#47b717";}
  else{rg="LATERAL — reversão à média válida";rgC="#ffa940";}

  // Pressão
  const l24=c1h.slice(-24);let bv=0,sv=0;
  l24.forEach(x=>{x.c>=x.o?bv+=x.v:sv+=x.v;});
  const tot=bv+sv||1,bp=Math.round(100*bv/tot),sp=100-bp;

  // Escada de níveis
  const rungs=[
    {lbl:"EMA21 · 15m (resistência)",val:reclaim,c:"#ffa940"},
    {lbl:"EMA9 / Hamming · 15m",val:partial,c:"#8b8bf0"},
    {lbl:"PREÇO AO VIVO",val:live,c:"#1a90ff"},
    {lbl:"Suporte estrutural",val:structLow,c:"#b22e32"},
    {lbl:"EMA50 · 1h (suporte forte)",val:e50h[last1h],c:"#47b717"},
  ].sort((a,b)=>b.val-a.val);
  const vals=rungs.map(r=>r.val),hi=Math.max(...vals),lo=Math.min(...vals),rng=(hi-lo)||1;
  const ladderHtml=rungs.map(r=>{
    const pos=((r.val-lo)/rng*100).toFixed(1);
    return`<div class="mRung"><span class="mRlbl">${r.lbl}</span><div class="mRbar"><i style="left:${pos}%;background:${r.c}"></i></div><span class="mRval" style="color:${txtR(r.c)}">${f2m(r.val)}</span></div>`;
  }).join("");

  // ---- Gestão de risco & contexto (ATR, R:R, funding/OI, regime diário) ----
  const atr14=mAtr(c1h,14);
  const atrStopVal=atr14!=null?live-atr14*2:null;
  const riscoVal=live-structLow;
  const riscoOk=riscoVal>0;
  const alvo2Val=riscoOk?live+riscoVal*2:null, alvo3Val=riscoOk?live+riscoVal*3:null;

  let dRegimeLbl="amostra diária insuficiente",dRegimeC="#a3a3a3";
  if(cD&&cD.length>=180){
    const dCloses=cD.map(x=>x.c);
    const e50d=mEma(dCloses,50),e200d=mEma(dCloses,200),dLast=dCloses.length-1;
    const slopeD=e200d[dLast]-e200d[dLast-30];
    if(live>e50d[dLast]&&e50d[dLast]>e200d[dLast]&&slopeD>0){dRegimeLbl="ALTA — tendência de fundo positiva";dRegimeC="#47b717";}
    else if(live<e50d[dLast]&&e50d[dLast]<e200d[dLast]&&slopeD<0){dRegimeLbl="BAIXA — evite comprar força";dRegimeC="#ffb4b8";}
    else{dRegimeLbl="MISTO/LATERAL — sem alinhamento claro";dRegimeC="#ffa940";}
  }

  const fundingStr=funding!=null?(funding>=0?"+":"")+funding.toFixed(4)+"%":"—";
  const oiStr=oi!=null?Math.round(oi).toLocaleString("en-US"):"—";
  const riskGridHtml=`
  <div class="mo-risk">
    <div class="mo-c"><h5>ATR (1h·14) &amp; Stop</h5>
      <div class="rk-val" style="color:#1a90ff">${atr14!=null?f2m(atr14):"—"}</div>
      <div class="rk-sub">Stop sugerido 2×ATR: <strong style="color:#fafafa">${atrStopVal!=null?f2m(atrStopVal):"—"}</strong></div>
    </div>
    <div class="mo-c"><h5>Risco &amp; Alvos R:R</h5>
      <div class="rk-val" style="color:${riscoOk?"#fafafa":"#ffb4b8"}">${riscoOk?f2m(riscoVal):"preço < suporte"}</div>
      <div class="rk-sub">${riscoOk?`R:R 1:2 → <strong style="color:#47b717">${f2m(alvo2Val)}</strong> · 1:3 → <strong style="color:#47b717">${f2m(alvo3Val)}</strong>`:"recalcular stop/suporte"}</div>
    </div>
    <div class="mo-c"><h5>Funding / Open Interest</h5>
      <div class="rk-val">${isCrypto?fundingStr:"—"}</div>
      <div class="rk-sub">${isCrypto?`OI: <strong style="color:#fafafa">${oiStr}</strong> · perp Bybit`:"aplica-se só a perpétuos cripto"}</div>
    </div>
    <div class="mo-c"><h5>Tendência Diária</h5>
      <div class="rk-val" style="color:${dRegimeC};font-size:13.5px;line-height:1.3">${dRegimeLbl}</div>
      <div class="rk-sub">EMA50D vs EMA200D · estilo trend template</div>
    </div>
  </div>`;

  // Briefing notes
  const bn=st||{};
  const briefHtml=`
<div class="mo-bc"><h5>🏛 Governança &amp; Estrutura</h5><p>${bn.structural_note||"—"}</p></div>
<div class="mo-bc"><h5>🌐 Cenário Macro</h5><p>${bn.macro_note||"—"}</p></div>
<div class="mo-bc"><h5>📊 Análise Técnica</h5><p>${bn.tech_note||"—"}</p></div>
<div class="mo-bc"><h5>🏄 Setup Swing Trade</h5><p>${bn.swing_note||"—"}</p></div>`;

  container.innerHTML=`
<div class="mo-bea">
  <div class="mo-blt" style="background:${beaconC};box-shadow:0 0 0 5px ${beaconC}22,0 0 16px ${beaconC}44"></div>
  <div>
    <div style="font-size:15px;font-weight:800;color:${txtR(beaconC)};letter-spacing:.3px">${label}</div>
    <div style="font-size:12.5px;color:#a3a3a3;margin-top:4px;line-height:1.55">${sub}</div>
  </div>
</div>
${riskGridHtml}
<div class="mo-tr">
  <div class="mo-c"><h5>Escada de Níveis</h5>${ladderHtml}</div>
  <div class="mo-c"><h5>Médias Móveis · Ao Vivo</h5>
    <table class="mMA">
      <tr><td>Preço ao vivo</td><td style="color:#1a90ff">${f2m(live)}</td></tr>
      <tr><td>EMA 9 · 15m</td><td>${f2m(e9[N-1])}</td></tr>
      <tr><td>Hamming 10 · 15m</td><td>${f2m(ham[N-1])}</td></tr>
      <tr><td>EMA 21 · 15m</td><td>${f2m(e21[N-1])}</td></tr>
      <tr><td>EMA 50 · 15m</td><td>${f2m(e50[N-1])}</td></tr>
      <tr><td>EMA 21 · 1h</td><td>${f2m(e21h[last1h])}</td></tr>
      <tr><td>EMA 50 · 1h</td><td style="color:#47b717">${f2m(e50h[last1h])}</td></tr>
    </table>
  </div>
  <div class="mo-c"><h5>Mercado</h5>
    <div style="font-size:11px;color:#a3a3a3;font-weight:600;letter-spacing:.08em;margin-bottom:6px">PRESSÃO COMPRADORES · 24H</div>
    <div class="mPress"><div class="mPBuy" style="width:${bp}%">${bp}%</div><div class="mPSell">${sp}%</div></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:#a3a3a3;margin-top:4px;margin-bottom:12px">
      <span style="color:${bp>=sp?"#47b717":"#ffb4b8"}">${bp>=sp?"comprador no controle":"vendedor domina"}</span>
      <span>C ${bp}% · V ${sp}%</span>
    </div>
    <div style="font-size:11px;color:#a3a3a3;font-weight:600;letter-spacing:.08em;margin-bottom:6px">REGIME (GATE 1 · EMA21·1H)</div>
    <div style="font-size:13px;font-weight:700;color:${rgC}">${rg}</div>
    <div style="font-size:11px;color:#a3a3a3;margin-top:3px">slope ${pct6>=0?"+":""}${pct6.toFixed(2)}% · 6 barras</div>
  </div>
</div>
${liveActivityPanelHtml(id,isCrypto)}
<div class="mo-br">${briefHtml}</div>
<div class="mo-mac">
  <h5>📅 Contexto Macro</h5>
  <p><strong style="color:#ffa940">${ST.macro.fedEvent||""}</strong>${ST.macro.headline?" · "+ST.macro.headline:""}</p>
  <p style="margin-top:6px">Fear &amp; Greed: <strong style="color:#1a90ff">${ST.macro.fearGreed} · ${ST.macro.fearGreedLabel||""}</strong></p>
</div>`;

  // Liga o painel de atividade ao vivo (Birdeye p/ cripto suportada; candle p/ ações)
  if(isCrypto){ if(BIRDEYE_CFG[id]) startBirdeyePanel(id); }
  else { startStockPanel(id); }
}

function buildCard(id, name, catLabel, catColor, price, chg, high24, low24, volRaw, closes, stat, isCrypto) {
  const cc  = chg >= 0 ? C.g : C.rt;
  const rsi = calcRSI(closes);
  const sr  = srFromCloses(closes);
  const rv  = rsi !== null ? rsi : "—";
  const rc  = rsi !== null ? rsiC(rsi) : C.neu;
  const rl  = rsi !== null ? rsiL(rsi) : "";
  const sc  = SIG[stat.signal] || SIG.AGUARDAR;
  const bbc = bubC(stat.bubble);
  const stars = Array.from({length:5}, (_,i) =>
    `<div style="width:6px;height:6px;border-radius:1px;background:${i<stat.structural?C.gold:"#404040"}"></div>`
  ).join("");
  const segs = Array.from({length:10}, (_,i) =>
    `<div class="bseg" style="background:${i<Math.round(stat.bubble/10)?bbc:"#404040"}"></div>`

    `<div class="sri"><div class="srd" style="background:${clr}"></div>
     <span style="font-size:11px;font-weight:600;color:${txtR(clr)}">${fp(lvl,id)}</span>
     ${dist(lvl,price)}</div>`;

  return `

  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div style="font-size:16px;font-weight:700">${name}</div>

  </div>
  <div style="display:flex;align-items:baseline;justify-content:space-between">

      <span style="font-size:28px;font-weight:700;letter-spacing:-.02em" id="price-${id}">${fp(price,id)}</span>
      ${isCrypto?`<span id="live-${id}" title="Preço ao vivo via WebSocket (Bybit)" style="width:6px;height:6px;border-radius:50%;background:#47b717;opacity:.25;transition:opacity .3s"></span>`:""}
    </span>

      <div style="font-size:15px;font-weight:700;color:${cc}" id="chg-${id}">${chg>=0?"▲":"▼"} ${Math.abs(chg).toFixed(2)}%</div>

    </div>
  </div>
  <div style="height:42px;margin:0 -4px"><canvas id="sp-${id}" height="42"></canvas></div>

  </div>
  <div class="sep" style="display:flex;flex-direction:column;gap:8px">
    <div>
      <div class="glbl"><span class="gkey">RSI (14) · ao vivo</span><span class="gval" style="color:${txtR(rc)}">${rv}</span></div>
      <div class="gbar"><div class="gfill" style="width:${rv!=="—"?rv:0}%;background:${rc}"></div></div>

  </div>
</div>`;
}

let tab = "crypto";

  tab = t;

  document.getElementById("tab-s").classList.toggle("on", t === "stocks");
  document.getElementById("gc").style.display = t === "crypto" ? "grid" : "none";

let countdown = 60;
function updateCd() {
  const el = document.getElementById("cdwrap"); if (!el) return;
  const m  = Math.floor(countdown/60), s = countdown % 60;
  const pct = ((60 - countdown) / 60 * 100).toFixed(1);
  el.innerHTML = `
    <div style="font-size:10px;color:var(--txt2);text-align:right">Próx. atualização completa: <span style="color:${C.gold}">${m}:${String(s).padStart(2,"0")}</span></div>
    <div class="cdbg"><div class="cdfg" style="width:${pct}%"></div></div>`;
}

// ════════════════════════════════════════════════
// REAL-TIME PRICE — Bybit WebSocket (tickers)
// ════════════════════════════════════════════════
const wsState={};
let bybitWS=null;
function connectBybitWS(){
  try{
    bybitWS=new WebSocket("wss://stream.bybit.com/v5/public/linear");
    bybitWS.onopen=()=>{
      const args=CRYPTO_CFG.map(c=>`tickers.${c.bybitSym}`);
      bybitWS.send(JSON.stringify({op:"subscribe",args}));
    };
    bybitWS.onmessage=(ev)=>{
      let msg; try{msg=JSON.parse(ev.data);}catch{return;}
      if(!msg.topic||!msg.topic.startsWith("tickers."))return;
      const sym=msg.topic.split(".")[1];
      const id=SYM_TO_ID[sym]; if(!id)return;
      wsState[sym]={...(wsState[sym]||{}),...msg.data};
      const st=wsState[sym];
      const priceEl=document.getElementById("price-"+id);
      const chgEl=document.getElementById("chg-"+id);
      const liveEl=document.getElementById("live-"+id);
      if(priceEl&&st.lastPrice!=null)priceEl.textContent=fp(st.lastPrice,id);
      if(chgEl&&st.price24hPcnt!=null){
        const chg=parseFloat(st.price24hPcnt)*100;
        chgEl.style.color=chg>=0?C.g:C.rt;
        chgEl.textContent=`${chg>=0?"▲":"▼"} ${Math.abs(chg).toFixed(2)}%`;
      }
      if(liveEl)liveEl.style.opacity="1";
    };
    bybitWS.onclose=()=>{ setTimeout(connectBybitWS,3000); };
    bybitWS.onerror=()=>{ try{bybitWS.close();}catch{} };
  }catch(e){ console.warn("WebSocket Bybit indisponível, mantendo polling:",e.message); }
}
