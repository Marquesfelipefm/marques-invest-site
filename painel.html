// CoinGecko tem CORS nativo — chamada direta sem proxy
async function cgFetch(url) {
  const r = await fetch(url, { signal: AbortSignal.timeout(15000) });
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}

// Proxies usados APENAS para Yahoo Finance
const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];
let activeProxy = 0;

async function pfetch(rawUrl, attempt = 0) {
  if (attempt >= PROXIES.length) throw new Error("Todos os proxies falharam para: " + rawUrl);
  const url = PROXIES[attempt](rawUrl);
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const txt = await r.text();
    const json = JSON.parse(txt);
    activeProxy = attempt;
    return json;
  } catch(e) {
    console.warn(`Proxy ${attempt+1} falhou (${e.message}), tentando próximo...`);
    return pfetch(rawUrl, attempt + 1);
  }
}

const CG_BASE = "https://api.coingecko.com/api/v3";
const YF_BASE = "https://query1.finance.yahoo.com/v8/finance/chart";

async function cgPrices(ids) {
  const u = `${CG_BASE}/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true&include_24hr_vol=true&include_high_24h=true&include_low_24h=true`;
  return cgFetch(u);
}

async function cgChart(cgId) {
  const u = `${CG_BASE}/coins/${cgId}/market_chart?vs_currency=usd&days=30&interval=daily`;
  const data = await cgFetch(u);
  return data?.prices?.map(p => p[1]) || [];
}

async function yfStock(sym) {
  const u = `${YF_BASE}/${sym}?interval=1d&range=2mo&includePrePost=false`;
  const d = await pfetch(u, 0);
  const res = d.chart?.result?.[0];
  if (!res) throw new Error("Yahoo: sem resultado para " + sym);
  const q      = res.indicators?.quote?.[0] || {};
  const closes = (q.close || []).filter(Boolean);
  const highs  = (q.high  || []).filter(Boolean);
  const lows   = (q.low   || []).filter(Boolean);
  const price  = res.meta.regularMarketPrice || closes.at(-1) || 0;
  const prev   = closes.at(-2) || price;
  const change = prev ? (price - prev) / prev * 100 : 0;
  return { price, change,
    high24: highs.at(-1) || price,
    low24:  lows.at(-1)  || price,
    closes, highs, lows };
}

// ════════════════════════════════════════════════
// INDICATORS
// ════════════════════════════════════════════════
function calcRSI(closes, p = 14) {
  if (!closes || closes.length < p + 1) return null;
  const c = closes.slice(-p - 1);
  let g = 0, l = 0;
  for (let i = 1; i <= p; i++) {
    const d = c[i] - c[i-1];
    if (d > 0) g += d; else l -= d;
  }
  const ag = g / p, al = l / p;
  if (al === 0) return 100;
  return Math.round(100 - 100 / (1 + ag / al));
}

function srFromCloses(closes) {
  if (!closes || closes.length < 5) return { support:[0,0], resistance:[0,0] };
  const r5  = closes.slice(-5);
  const r21 = closes.slice(-Math.min(21, closes.length));
  return {
    support:    [Math.min(...r5),  Math.min(...r21)],
    resistance: [Math.max(...r5),  Math.max(...r21)],
  };
}

// FORMAT
// ════════════════════════════════════════════════
function fp(v, id) {
  const n = parseFloat(v); if (!n) return "—";
  if (id === "ada" || n < 1)  return "$" + n.toFixed(4);
  if (n < 10)  return "$" + n.toFixed(3);
  if (n < 100) return "$" + n.toFixed(2);
  return "$" + n.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fvol(v) {
  const n = parseFloat(v); if (!n) return "—";
  if (n >= 1e9) return (n/1e9).toFixed(2) + "B";
  if (n >= 1e6) return (n/1e6).toFixed(1) + "M";
  return (n/1e3).toFixed(1) + "K";
}
function dist(lvl, price) {
  if (!lvl || !price) return "";
  const d = ((lvl - price) / price * 100).toFixed(1);
  return `<span style="font-size:7px;color:#444">(${d > 0 ? "+" : ""}${d}%)</span>`;
}
function nowStr() { return new Date().toLocaleString("pt-BR",{dateStyle:"short",timeStyle:"short"}); }

const C = { gold:"#C9A84C", g:"#4CAF50", r:"#f44336", amb:"#FF9800", blu:"#4a9fd4", neu:"#555" };
const rsiC = v => v <= 30 ? C.g : v >= 70 ? C.r : C.amb;
const rsiL = v => v <= 30 ? "Sobrevendido ↩" : v >= 70 ? "Sobrecomprado ⚡" : "Neutro";
const bubC = v => v >= 75 ? "#fb923c" : v >= 50 ? C.amb : C.neu;
const bubL = v => v >= 75 ? "Bolha Alta ⚡" : v >= 50 ? "Aquecido" : "Frio";
const SIG = {
  LONG:     { color:C.g,   bg:"rgba(76,175,80,.12)",  bd:"rgba(76,175,80,.4)"  },
  SHORT:    { color:C.r,   bg:"rgba(244,67,54,.12)",  bd:"rgba(244,67,54,.4)"  },
  AGUARDAR: { color:C.amb, bg:"rgba(255,152,0,.12)",  bd:"rgba(255,152,0,.4)"  },
};

// ════════════════════════════════════════════════
// STATUS BAR
// ════════════════════════════════════════════════
function setStatus(msg, type = "ok") {
  const bar = document.getElementById("status-bar");
  const dot = document.getElementById("sdot");
  const txt = document.getElementById("status-msg");
  if (!bar) return;
  bar.className = type;
  bar.style.animation = type === "warn" ? "pulse 1.4s infinite" : "none";
  dot.style.background = type === "ok" ? C.g : type === "err" ? C.r : C.amb;
  txt.textContent = msg;
}

// ════════════════════════════════════════════════
// SPARKLINES
// ════════════════════════════════════════════════
const spCharts = {};
function drawSpark(id, prices, color) {
  const el = document.getElementById("sp-" + id);
  if (!el || !prices || prices.length < 2) return;
  if (spCharts[id]) { spCharts[id].destroy(); delete spCharts[id]; }
  spCharts[id] = new Chart(el.getContext("2d"), {
    type: "line",
    data: { labels: prices.map((_,i) => i), datasets:[{
      data: prices, borderColor: color, borderWidth: 1.5,
      tension: .35, pointRadius: 0, fill: false
    }]},
    options: {
      animation: {duration:400}, responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{enabled:false}},
      scales:{x:{display:false}, y:{display:false}},
    },
  });
}

// ════════════════════════════════════════════════
// TOGGLE BRIEFING
// ════════════════════════════════════════════════
function toggleB(id) {
  const el   = document.getElementById("brief-" + id);
  const btn  = document.getElementById("btn-" + id);
  const card = document.getElementById("card-" + id);
  const open = el.classList.toggle("on");
  btn.classList.toggle("on", open);
  btn.textContent = open ? "▲ Fechar Briefing" : "▼ Ver Briefing Completo";
  card.style.borderColor = open ? "rgba(201,168,76,.35)" : "";
}

// ════════════════════════════════════════════════
// BUILD CARD
// ════════════════════════════════════════════════
function buildCard(id, name, catLabel, catColor, price, chg, high24, low24, volRaw, closes, stat) {
  const cc  = chg >= 0 ? C.g : C.r;
  const rsi = calcRSI(closes);
  const sr  = srFromCloses(closes);
  const rv  = rsi !== null ? rsi : "—";
  const rc  = rsi !== null ? rsiC(rsi) : C.neu;
  const rl  = rsi !== null ? rsiL(rsi) : "";
  const sc  = SIG[stat.signal] || SIG.AGUARDAR;
  const bbc = bubC(stat.bubble);
  const stars = Array.from({length:5}, (_,i) =>
    `<div style="width:6px;height:6px;border-radius:1px;background:${i<stat.structural?C.gold:"#1e1e1e"}"></div>`
  ).join("");
  const segs = Array.from({length:10}, (_,i) =>
    `<div class="bseg" style="background:${i<Math.round(stat.bubble/10)?bbc:"#1e1e1e"}"></div>`
  ).join("");
  const srItem = (lvl, clr) =>
    `<div class="sri"><div class="srd" style="background:${clr}"></div>
     <span style="font-size:9px;font-weight:600;color:${clr}">${fp(lvl,id)}</span>
     ${dist(lvl,price)}</div>`;

  return `
<div class="card" id="card-${id}">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div style="font-size:14px;font-weight:700">${name}</div>
      <div style="font-size:8px;color:var(--txt2);margin-top:1px;letter-spacing:.04em">${id.toUpperCase()}/USDT</div>
    </div>
    <span class="ctag" style="color:${catColor};border-color:${catColor}44">${catLabel}</span>
  </div>
  <div style="display:flex;align-items:baseline;justify-content:space-between">
    <span style="font-size:26px;font-weight:700;letter-spacing:-.02em">${fp(price,id)}</span>
    <div style="text-align:right">
      <div style="font-size:13px;font-weight:700;color:${cc}">${chg>=0?"▲":"▼"} ${Math.abs(chg).toFixed(2)}%</div>
      <div style="font-size:7px;color:var(--txt2)">Vol 24h: ${fvol(volRaw)}</div>
    </div>
  </div>
  <div style="height:42px;margin:0 -4px"><canvas id="sp-${id}" height="42"></canvas></div>
  <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--txt2)">
    <span>H 24h: <span style="color:${C.g}">${fp(high24,id)}</span></span>
    <span>L 24h: <span style="color:${C.r}">${fp(low24,id)}</span></span>
  </div>
  <div class="sep" style="display:flex;flex-direction:column;gap:8px">
    <div>
      <div class="glbl"><span class="gkey">RSI (14) · ao vivo</span><span class="gval" style="color:${rc}">${rv}</span></div>
      <div class="gbar"><div class="gfill" style="width:${rv!=="—"?rv:0}%;background:${rc}"></div></div>
      <div class="gsub" style="color:${rc}">${rl}</div>
    </div>
    <div>
      <div class="glbl"><span class="gkey">Bolha Especulativa</span><span class="gval" style="color:${bbc}">${stat.bubble}%</span></div>
      <div class="bsegs">${segs}</div>
      <div class="gsub" style="color:${bbc}">${bubL(stat.bubble)}</div>
    </div>
  </div>
  <div class="sep srw">
    <div class="src"><div class="srh">Suporte</div>${srItem(sr.support[0],C.g)}${srItem(sr.support[1],C.g)}</div>
    <div style="width:.5px;background:var(--brd)"></div>
    <div class="src"><div class="srh">Resistência</div>${srItem(sr.resistance[0],C.r)}${srItem(sr.resistance[1],C.r)}</div>
  </div>
  <div class="sep sigr">
    <div style="display:flex;align-items:center">
      <span class="sigb" style="color:${sc.color};background:${sc.bg};border-color:${sc.bd}">${stat.signal}</span>
      <span style="font-size:8px;color:${sc.color};opacity:.8;margin-left:5px">${stat.signalStrength}</span>
    </div>
    <div style="display:flex;align-items:center;gap:3px">
      <span style="font-size:7px;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em">Estrutural</span>
      <div style="display:flex;gap:1px;margin-left:2px">${stars}</div>
      <span style="font-size:7px;color:${C.gold}">${stat.structural}/5</span>
    </div>
  </div>
  <button class="bbtn" id="btn-${id}" onclick="toggleB('${id}')">▼ Ver Briefing Completo</button>
  <div class="brief" id="brief-${id}">
    <div><div class="bsh"><span>🏛</span><span class="bslbl" style="color:${C.gold}">Governança &amp; Estrutura de Valor</span></div><p class="bsbdy">${stat.structural_note}</p></div>
    <div><div class="bsh"><span>🌐</span><span class="bslbl" style="color:${C.blu}">Cenário Macro</span></div><p class="bsbdy">${stat.macro_note}</p></div>
    <div><div class="bsh"><span>📊</span><span class="bslbl" style="color:${C.neu}">Análise Técnica</span></div><p class="bsbdy">${stat.tech_note}</p></div>
    <div><div class="bsh"><span>🏄</span><span class="bslbl" style="color:${C.g}">Setup Swing Trade</span></div><p class="bsbdy">${stat.swing_note}</p></div>
  </div>
</div>`;
}

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
let tab = "crypto";
function switchTab(t) {
  tab = t;
  document.getElementById("tab-c").classList.toggle("on", t === "crypto");
  document.getElementById("tab-s").classList.toggle("on", t === "stocks");
  document.getElementById("gc").style.display = t === "crypto" ? "grid" : "none";
  document.getElementById("gs").style.display = t === "stocks" ? "grid" : "none";
}

let countdown = 300;
function updateCd() {
  const el = document.getElementById("cdwrap"); if (!el) return;
  const m  = Math.floor(countdown/60), s = countdown % 60;
  const pct = ((300 - countdown) / 300 * 100).toFixed(1);
  el.innerHTML = `
    <div style="font-size:8px;color:var(--txt2);text-align:right">Próx. refresh: <span style="color:${C.gold}">${m}:${String(s).padStart(2,"00")}</span></div>
    <div class="cdbg"><div class="cdfg" style="width:${pct}%"></div></div>`;
}

// ════════════════════════════════════════════════
// MAIN FETCH
// ════════════════════════════════════════════════
async function fetchAll() {
  setStatus("Buscando preços (CoinGecko direto · Yahoo via proxy)...", "warn");
  try {
    // 1. Batch price (todos os cryptos)
    const cgIds = CRYPTO_CFG.map(c => c.cgId).join(",");
    const prices = await cgPrices(cgIds);

    // 2. Charts para RSI (paralelo com pequeno stagger p/ rate limit)
    const chartResults = await Promise.all(
      CRYPTO_CFG.map((c, i) => new Promise(res =>
        setTimeout(() => cgChart(c.cgId).then(res).catch(()=>res([])), i * 250)
      ))
    );

    // 3. Ações
    const stockResults = await Promise.allSettled(
      STOCK_CFG.map(c => yfStock(c.sym))
    );

    // Contagem de sinais
    const counts = {LONG:0,SHORT:0,AGUARDAR:0};
    [...CRYPTO_CFG.map(c=>c.id),...STOCK_CFG.map(c=>c.id)]
      .forEach(id => { const s = ST.assets[id]?.signal; if(s) counts[s]++; });

    const btcD   = prices["bitcoin"] || {};
    const btcP   = btcD.usd || 0;
    const btcChg = btcD.usd_24h_change || 0;
    const btcCC  = btcChg >= 0 ? C.g : C.r;
    const fgCol  = ST.macro.fearGreed <= 25 ? C.r : ST.macro.fearGreed <= 50 ? C.amb : C.g;
    const badges = Object.entries(counts).filter(([,n])=>n>0).map(([sig,n])=>{
      const s = SIG[sig];
      return `<span class="badge" style="color:${s.color};background:${s.bg};border-color:${s.bd}">${n} ${sig}</span>`;
    }).join("");

    // Monta cards cripto
    const cryptoHtml = CRYPTO_CFG.map((cfg, i) => {
      const p = prices[cfg.cgId] || {};
      return buildCard(cfg.id, cfg.name, cfg.lbl, cfg.color,
        p.usd||0, p.usd_24h_change||0,
        p.usd_24h_high||p.usd*1.01||0, p.usd_24h_low||p.usd*.99||0,
        p.usd_24h_vol||0, chartResults[i]||[], ST.assets[cfg.id]);
    }).join("");

    // Monta cards ações
    const stockHtml = STOCK_CFG.map((cfg, i) => {
      const res = stockResults[i];
      if (res.status === "rejected" || !res.value) {
        return `<div class="card skel"><span style="color:${C.r};font-size:10px">⚠ ${cfg.name}: erro</span></div>`;
      }
      const d = res.value;
      return buildCard(cfg.id, cfg.name, cfg.lbl, cfg.color,
        d.price, d.change, d.high24, d.low24, 0, d.closes, ST.assets[cfg.id]);
    }).join("");

    // Injeta tudo
    document.getElementById("app").innerHTML = `
<div class="hd">
  <div class="brand">
    <div class="bbar"></div>
    <div>
      <span style="font-size:14px;font-weight:800;color:${C.gold};letter-spacing:.1em">MARQUES INVEST</span>
      <span style="font-size:10px;color:var(--txt2)"> · Swing Trade · Bybit + NYSE</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end">
    ${badges}
    <div style="text-align:right">
      <div style="font-size:8px;color:var(--txt2)">Atualizado: ${nowStr()}</div>
      <div id="cdwrap"></div>
    </div>
  </div>
</div>
<div class="macro">
  <div class="mrow">
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:8px;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em">BTC</span>
      <span style="font-size:11px;font-weight:700">$${btcP.toLocaleString("en-US",{maximumFractionDigits:0})}</span>
      <span style="font-size:11px;font-weight:700;color:${btcCC}">${btcChg>=0?"+":""}${btcChg.toFixed(2)}%</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:8px;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em">Dom.</span>
      <span style="font-size:11px;font-weight:700;color:${C.amb}">~58.9%</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:8px;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em">Fear &amp; Greed</span>
      <span style="font-size:11px;font-weight:700;color:${fgCol}">${ST.macro.fearGreed} · ${ST.macro.fearGreedLabel}</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:8px;color:${C.amb}">📅 ${ST.macro.fedEvent}</span>
    </div>
  </div>
  <p style="font-size:10px;color:var(--txt2);line-height:1.55">⚠ ${ST.macro.headline}</p>
</div>
<div class="tabs">
  <button class="tab on" id="tab-c" onclick="switchTab('crypto')">🔷 Cripto (6) · Bybit</button>
  <button class="tab" id="tab-s" onclick="switchTab('stocks')">📈 Ações Tech (5) · NYSE</button>
</div>
<div class="grid" id="gc">${cryptoHtml}</div>
<div class="grid" id="gs" style="display:none">${stockHtml}</div>
<div class="ft">
  <div style="display:flex;align-items:center;gap:6px">
    <div class="sdot" id="sdot"></div>
    <span style="font-size:8px;color:var(--txt2)">11 ativos · CoinGecko + Yahoo Finance · auto-refresh 5 min</span>
  </div>
  <span style="font-size:8px;color:${C.gold};opacity:.7;letter-spacing:.06em">
    MARQUES INVEST · <span style="color:var(--txt2)">fins analíticos</span>
  </span>
</div>`;

    // Sparklines
    CRYPTO_CFG.forEach((cfg, i) => {
      const chg = (prices[cfg.cgId]?.usd_24h_change || 0);
      drawSpark(cfg.id, chartResults[i] || [], chg >= 0 ? C.g : C.r);
    });
    STOCK_CFG.forEach((cfg, i) => {
      const res = stockResults[i];
      if (res.status === "fulfilled" && res.value)
        drawSpark(cfg.id, res.value.closes, res.value.change >= 0 ? C.g : C.r);
    });

    setStatus("✓ Dados ao vivo · CoinGecko direto + Yahoo Finance via proxy", "ok");
    countdown = 300;

  } catch(e) {
    console.error("fetchAll falhou:", e);
    setStatus("✗ Falha ao carregar — verifique sua internet. Retry em 60s.", "err");
    countdown = 60;
  }
}

// ════════════════════════════════════════════════
// TIMER
// ════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", () => {
  fetchAll();
  setInterval(() => {
    countdown--;
    updateCd();
    if (countdown <= 0) fetchAll();
  }, 1000);
});
</script>
</body>
</html>
