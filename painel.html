async function pfetch(rawUrl, attempt = 0) {
  if (attempt >= PROXIES.length) throw new Error("Todos os proxies falharam — tente desativar Brave Shields para este site");
  const url = PROXIES[attempt](rawUrl);
  try {

// ════════════════════════════════════════════════
function calcRSI(closes, p = 14) {
  if (!closes || closes.length < p + 1) return null;
  const c = closes.slice(-p - 1);
  let g = 0, l = 0;
  for (let i = 1; i <= p; i++) {
    const d = c[i] - c[i-1];
    if (d > 0) g += d; else l -= d;
  }
  const ag = g / p, al = l / p;
  if (al === 0) return 100;
  return Math.round(100 - 100 / (1 + ag / al));
}

function srFromCloses(closes) {
  if (!closes || closes.length < 5) return { support:[0,0], resistance:[0,0] };
  const r5  = closes.slice(-5);
  const r21 = closes.slice(-Math.min(21, closes.length));
  return {
    support:    [Math.min(...r5),  Math.min(...r21)],
    resistance: [Math.max(...r5),  Math.max(...r21)],
  };
}

// ════════════════════════════════════════════════
// METRICS — EMA / Hamming / Format helpers
// ════════════════════════════════════════════════
function mEma(v,n){const k=2/(n+1);let e=v[0];const o=[e];for(let i=1;i<v.length;i++){e=v[i]*k+e*(1-k);o.push(e);}return o;}
function mHamming(v,n=10){const w=[];let s=0;for(let i=0;i<n;i++){const x=0.54-0.46*Math.cos(2*Math.PI*i/(n-1));w.push(x);s+=x;}
  for(let i=0;i<n;i++)w[i]/=s;const o=Array(v.length).fill(null);
  for(let i=n-1;i<v.length;i++){let a=0;for(let j=0;j<n;j++)a+=v[i-n+1+j]*w[j];o[i]=a;}return o;}
function f2m(x){
  if(x==null||isNaN(x))return"—";const n=parseFloat(x);
  if(n<1)return"$"+n.toFixed(4);if(n<100)return"$"+n.toFixed(2);
  return"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}

function mRsiArr(closes,n=14){
  const g=[],l=[];
  for(let i=1;i<closes.length;i++){const d=closes[i]-closes[i-1];g.push(d>0?d:0);l.push(d<0?-d:0);}
  let ag=g.slice(0,n).reduce((a,b)=>a+b,0)/n,al=l.slice(0,n).reduce((a,b)=>a+b,0)/n;
  const rsi=[al===0?100:100-100/(1+ag/al)];
  for(let i=n;i<g.length;i++){ag=(ag*(n-1)+g[i])/n;al=(al*(n-1)+l[i])/n;rsi.push(al===0?100:100-100/(1+ag/al));}
  return rsi;
}
function mStoch(closes,highs,lows,k=14,sm=3,d=3){
  const rawK=[];
  for(let i=k-1;i<closes.length;i++){
    const hh=Math.max(...highs.slice(i-k+1,i+1)),ll=Math.min(...lows.slice(i-k+1,i+1));
    rawK.push(hh===ll?50:(closes[i]-ll)/(hh-ll)*100);
  }
  const sma=(a,n)=>{const o=[];for(let i=n-1;i<a.length;i++)o.push(a.slice(i-n+1,i+1).reduce((x,y)=>x+y,0)/n);return o;};
  const smK=sma(rawK,sm),smD=sma(smK,d);
  return{K:smK[smK.length-1]??50,D:smD[smD.length-1]??50};
}
function mPivots(arr,left=3,right=3){
  const hs=[],ls=[];
  for(let i=left;i<arr.length-right;i++){
    const sl=arr.slice(i-left,i+right+1),v=arr[i];
    if(v===Math.max(...sl))hs.push({i,v});
    if(v===Math.min(...sl))ls.push({i,v});
  }
  return{hs,ls};
}
function mDivergence(closes,rsiArr,left=3,right=3){
  const off=closes.length-rsiArr.length,ac=closes.slice(off);
  const{hs,ls}=mPivots(ac,left,right);
  if(hs.length>=2){
    const[p1,p2]=hs.slice(-2),r1=rsiArr[p1.i]??50,r2=rsiArr[p2.i]??50;
    if(p2.v>p1.v&&r2<r1-2)return{type:'bearish',label:'🔴 Bearish Divergência',desc:`Preço topo mais alto (${f2m(p1.v)}→${f2m(p2.v)}) mas RSI caiu (${r1.toFixed(0)}→${r2.toFixed(0)}). Exaustão comprador.`};
  }
  if(ls.length>=2){
    const[p1,p2]=ls.slice(-2),r1=rsiArr[p1.i]??50,r2=rsiArr[p2.i]??50;
    if(p2.v<p1.v&&r2>r1+2)return{type:'bullish',label:'🟢 Bullish Divergência',desc:`Preço fundo mais baixo (${f2m(p1.v)}→${f2m(p2.v)}) mas RSI subiu (${r1.toFixed(0)}→${r2.toFixed(0)}). Fraqueza vendedor.`};
  }
  return{type:'neutral',label:'🟡 Neutro',desc:'Sem divergência detectada nos últimos swings.'};
}
function mFibLevels(high,low,price){
  const rg=high-low;
  return[
    {lbl:'Topo',val:high},
    {lbl:'78.6%',val:high-0.214*rg},
    {lbl:'61.8%',val:high-0.382*rg},
    {lbl:'50%',val:high-0.5*rg},
    {lbl:'38.2%',val:high-0.618*rg},

  ].map(f=>({...f,dist:((price-f.val)/(f.val||1)*100)}));
}

  const ci=N-2,live=closes15[N-1];

    zone="INVAL";beaconC="#ea3943";label="BAIXA / SHORT";

  }else if(lastC>partial){
    zone="PART";beaconC="#f0b90b";label="PARCIAL — AGUARDAR";
    sub=`Recuperou EMA9/Hamming (${f2m(partial)}) mas abaixo da EMA21 (${f2m(reclaim)}). Aguarde confirmação.`;
  }else{
    zone="WAIT";beaconC="#555";label="AGUARDAR";
    sub=`Preço abaixo das médias. Confirmação acima de ${f2m(reclaim)}.`;
  }

  const slope6=e21h[last1h]-e21h[Math.max(0,last1h-6)];
  const pct6=slope6/(e21h[Math.max(0,last1h-6)]||1)*100;
  let rg,rgC;
  if(pct6<-0.6){rg="TENDÊNCIA DE BAIXA — Gate 1 ativo";rgC="#ea3943";}
  else if(pct6>0.6){rg="TENDÊNCIA DE ALTA — long válido";rgC="#16c784";}
  else{rg="LATERAL — reversão à média válida";rgC="#f0b90b";}

  const l24=c1h.slice(-24);let bv=0,sv=0;
  l24.forEach(x=>{x.c>=x.o?bv+=x.v:sv+=x.v;});
  const tot=bv+sv||1,bp=Math.round(100*bv/tot),sp=100-bp;

    {lbl:"EMA21 15m (resistência)",val:reclaim,c:"#FF9800"},

    {lbl:"PREÇO AO VIVO",val:live,c:"#3dd6f5"},

    {lbl:"EMA50 1h (suporte forte)",val:e50h[last1h],c:"#16c784"},
  ].sort((a,b)=>b.val-a.val);

const mLoaded={};

async function openMetrics(id){
  const modal=document.getElementById("ativo-modal");
  const cryptoCfg=CRYPTO_CFG.find(c=>c.id===id);
  const stockCfg=STOCK_CFG.find(c=>c.id===id);
  const cfg=cryptoCfg||stockCfg;
  if(!cfg)return;

  // Preencher header
  document.getElementById("mo-dot").style.background=cfg.color;
  document.getElementById("mo-nm").textContent=cfg.name;
  document.getElementById("mo-lb").textContent=(cfg.lbl||"").toUpperCase();
  const st=ST.assets[id]||{};
  const sc=SIG[st.signal]||SIG.AGUARDAR;
  document.getElementById("mo-sig").innerHTML=
    `<span style="font-size:10px;font-weight:700;color:${sc.color};background:${sc.bg};border:1px solid ${sc.bd};padding:3px 10px;border-radius:5px">${st.signal||"AGUARDAR"}</span>`;

  // Abrir modal com loading
  const moBody=document.getElementById("mo-body");
  moBody.innerHTML='<div class="mo-ld">⟳ Calculando métricas ao vivo...</div>';
  modal.classList.add("open");
  document.body.style.overflow="hidden";
  modal.onclick=e=>{if(e.target===modal)closeModal();};
  document.onkeydown=e=>{if(e.key==="Escape")closeModal();};

  // Se já carregado, só rerenderiza
  if(mLoaded[id]){
    const{c15,c1h}=mLoaded[id];
    document.getElementById("mo-pr").textContent=f2m(c15[c15.length-1]?.c);
    renderModal(id,moBody,c15,c1h,st);
    return;
  }

  try{
    let c15,c1h;
    if(cryptoCfg){[c15,c1h]=await fetchBybitCandles(cryptoCfg.bybitSym);}
    else{[c15,c1h]=await fetchYFIntraday(stockCfg.sym);}
    mLoaded[id]={c15,c1h};
    document.getElementById("mo-pr").textContent=f2m(c15[c15.length-1]?.c);
    renderModal(id,moBody,c15,c1h,st);
  }catch(e){
    moBody.innerHTML=`<div class="mo-ld" style="color:#ea3943">⚠ Erro ao carregar: ${e.message}</div>`;
  }
}

function closeModal(){
  document.getElementById("ativo-modal").classList.remove("open");
  document.body.style.overflow="";
  document.onkeydown=null;
}

function renderModal(id,container,c15,c1h,st){
  const N=c15.length;
  if(N<30){container.innerHTML='<div class="mo-ld">Dados insuficientes para cálculo.</div>';return;}
  const closes15=c15.map(x=>x.c),lows15=c15.map(x=>x.l),highs15=c15.map(x=>x.h);
  const e9=mEma(closes15,9),e21=mEma(closes15,21),e50=mEma(closes15,50),ham=mHamming(closes15,10);
  const ci=N-2,live=closes15[N-1];
  const closes1h=c1h.map(x=>x.c);
  const e21h=mEma(closes1h,21),e50h=mEma(closes1h,50),last1h=closes1h.length-1;
  const win=lows15.slice(Math.max(0,ci-12),ci);
  const structLow=Math.min(...win);
  const reclaim=e21[ci],partial=Math.min(e9[ci],ham[ci]??e9[ci]),lastC=closes15[ci];

  let zone,beaconC,label,sub;
  if(lastC<structLow){
    zone="INVAL";beaconC="#ea3943";label="BAIXA / SHORT";
    sub=`Fechamento 15m ${f2m(lastC)} abaixo do suporte estrutural ${f2m(structLow)}. Próximo suporte: EMA50·1h ${f2m(e50h[last1h])}.`;
  }else if(lastC>reclaim){
    zone="CONF";beaconC="#16c784";label="COMPRA CONFIRMADA";
    sub=`Fechamento 15m ${f2m(lastC)} acima da EMA21 (${f2m(reclaim)}). Reclaim confirmado — gatilho de entrada ativo.`;
  }else if(lastC>partial){
    zone="PART";beaconC="#f0b90b";label="PARCIAL — AGUARDAR";
    sub=`Recuperou EMA9/Hamming (${f2m(partial)}) mas abaixo da EMA21 (${f2m(reclaim)}). Aguarde fechamento acima.`;
  }else{
    zone="WAIT";beaconC="#555";label="AGUARDAR";
    sub=`Preço abaixo das médias-chave. Confirmação acima de ${f2m(reclaim)} (EMA21·15m).`;
  }

  const sigBtn=document.getElementById("sigb-"+id);
  if(sigBtn){
    const sc2=zone==="CONF"?SIG.LONG:zone==="INVAL"?SIG.SHORT:SIG.AGUARDAR;
    const lblMap={CONF:"COMPRA",INVAL:"SHORT",PART:"PARCIAL",WAIT:"AGUARDAR"};
    sigBtn.textContent=lblMap[zone]||"AGUARDAR";
    sigBtn.style.color=sc2.color;sigBtn.style.background=sc2.bg;sigBtn.style.borderColor=sc2.bd;
  }

  const slope6=e21h[last1h]-e21h[Math.max(0,last1h-6)];
  const pct6=slope6/(e21h[Math.max(0,last1h-6)]||1)*100;
  let rg,rgC;
  if(pct6<-0.6){rg="TENDÊNCIA DE BAIXA — Gate 1 ativo";rgC="#ea3943";}
  else if(pct6>0.6){rg="TENDÊNCIA DE ALTA — long válido";rgC="#16c784";}
  else{rg="LATERAL — reversão à média válida";rgC="#f0b90b";}

  const l24=c1h.slice(-24);let bv=0,sv=0;
  l24.forEach(x=>{x.c>=x.o?bv+=x.v:sv+=x.v;});
  const tot=bv+sv||1,bp=Math.round(100*bv/tot),sp=100-bp;

  const rungs=[
    {lbl:"EMA21 · 15m (resistência)",val:reclaim,c:"#FF9800"},
    {lbl:"EMA9 / Hamming · 15m",val:partial,c:"#8b8bf0"},
    {lbl:"PREÇO AO VIVO",val:live,c:"#3dd6f5"},
    {lbl:"Suporte estrutural",val:structLow,c:"#ea3943"},
    {lbl:"EMA50 · 1h (suporte forte)",val:e50h[last1h],c:"#16c784"},
  ].sort((a,b)=>b.val-a.val);
  const vals=rungs.map(r=>r.val),hi=Math.max(...vals),lo=Math.min(...vals),rngg=(hi-lo)||1;
  const ladderHtml=rungs.map(r=>{
    const pos=((r.val-lo)/rngg*100).toFixed(1);
    return`<div class="mRung"><span class="mRlbl">${r.lbl}</span><div class="mRbar"><i style="left:${pos}%;background:${r.c}"></i></div><span class="mRval" style="color:${r.c}">${f2m(r.val)}</span></div>`;
  }).join("");

  // SWINGS INTERMEDIÁRIOS
  const rsiArr=mRsiArr(closes15,14);
  const stoch=mStoch(closes15,highs15,lows15,14,3,3);
  const K=stoch.K,D=stoch.D;
  let stZone,stZoneC,stZoneBg;
  if(K>80){stZone="SOBRECOMPRADO";stZoneC="#ea3943";stZoneBg="#ea394322";}
  else if(K<20){stZone="SOBREVENDIDO";stZoneC="#16c784";stZoneBg="#16c78422";}
  else{stZone="NEUTRO";stZoneC="#697489";stZoneBg="#69748922";}
  const stochHtml=`<div class="mSZ" style="color:${stZoneC};background:${stZoneBg}">${stZone}</div>
<table class="mMA"><tr><td>%K (rápida)</td><td style="color:${stZoneC};font-weight:700">${K.toFixed(1)}</td></tr><tr><td>%D (signal)</td><td>${D.toFixed(1)}</td></tr><tr><td>Tendência %K vs %D</td><td style="color:#8b8bf0">${K>D?"↑ K acima":"↓ K abaixo"}</td></tr></table>`;

  const div=mDivergence(closes15,rsiArr,3,3);
  const divC=div.type==='bearish'?"#ea3943":div.type==='bullish'?"#16c784":"#697489";
  const divHtml=`<div style="font-size:13px;font-weight:800;color:${divC};margin-bottom:8px">${div.label}</div><div style="font-size:10px;color:#697489;line-height:1.6">${div.desc}</div>`;

  const c1h50=c1h.slice(-50);
  const fibHigh=Math.max(...c1h50.map(x=>x.h));
  const fibLow=Math.min(...c1h50.map(x=>x.l));
  const fibs=mFibLevels(fibHigh,fibLow,live);
  const nearFib=fibs.reduce((a,b)=>Math.abs(a.dist)<Math.abs(b.dist)?a:b);
  const fibHtml=fibs.map(f=>{
    const isN=f.lbl===nearFib.lbl;
    const c=isN?"#3dd6f5":f.val>live?"#697489":"#444";
    return`<div class="mFR${isN?" mFC":""}"><span class="mFL" style="color:${isN?"#3dd6f5":"#697489"}">${f.lbl}</span><span class="mFV" style="color:${c}">${f2m(f.val)}</span><span class="mFD" style="color:${f.dist>0?"#16c784":f.dist<0?"#ea3943":"#697489"}">${f.dist>0?"+":""}${f.dist.toFixed(2)}%</span></div>`;
  }).join("");

  const bn=st||{};
  const briefHtml=`
<div class="mo-bc"><h5>🏛 Governança &amp; Estrutura</h5><p>${bn.structural_note||"—"}</p></div>
<div class="mo-bc"><h5>🌐 Cenário Macro</h5><p>${bn.macro_note||"—"}</p></div>
<div class="mo-bc"><h5>📊 Análise Técnica</h5><p>${bn.tech_note||"—"}</p></div>
<div class="mo-bc"><h5>🏄 Setup Swing Trade</h5><p>${bn.swing_note||"—"}</p></div>`;

  container.innerHTML=`
<div class="mo-bea">
  <div class="mo-blt" style="background:${beaconC};box-shadow:0 0 0 5px ${beaconC}22,0 0 16px ${beaconC}44"></div>
  <div><div style="font-size:13px;font-weight:800;color:${beaconC};letter-spacing:.3px">${label}</div>
  <div style="font-size:10.5px;color:#697489;margin-top:4px;line-height:1.55">${sub}</div></div>
</div>
<div class="mo-tr">
  <div class="mo-c"><h5>Escada de Níveis</h5>${ladderHtml}</div>
  <div class="mo-c"><h5>Médias Móveis · Ao Vivo</h5>
    <table class="mMA">
      <tr><td>Preço ao vivo</td><td style="color:#3dd6f5">${f2m(live)}</td></tr>
      <tr><td>EMA 9 · 15m</td><td>${f2m(e9[N-1])}</td></tr>
      <tr><td>Hamming 10 · 15m</td><td>${f2m(ham[N-1])}</td></tr>
      <tr><td>EMA 21 · 15m</td><td>${f2m(e21[N-1])}</td></tr>
      <tr><td>EMA 50 · 15m</td><td>${f2m(e50[N-1])}</td></tr>
      <tr><td>EMA 21 · 1h</td><td>${f2m(e21h[last1h])}</td></tr>
      <tr><td>EMA 50 · 1h</td><td style="color:#16c784">${f2m(e50h[last1h])}</td></tr>
    </table>
  </div>
  <div class="mo-c"><h5>Mercado</h5>
    <div style="font-size:9px;color:#697489;font-weight:600;letter-spacing:.08em;margin-bottom:6px">PRESSÃO COMPRADORES · 24H</div>
    <div class="mPress"><div class="mPBuy" style="width:${bp}%">${bp}%</div><div class="mPSell">${sp}%</div></div>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:#69748a;margin-top:4px;margin-bottom:12px">
      <span style="color:${bp>=sp?"#16c784":"#ea3943"}">${bp>=sp?"comprador no controle":"vendedor domina"}</span>
      <span>C ${bp}% · V ${sp}%</span>
    </div>
    <div style="font-size:9px;color:#697489;font-weight:600;letter-spacing:.08em;margin-bottom:6px">REGIME (GATE 1 · EMA21·1H)</div>
    <div style="font-size:11px;font-weight:700;color:${rgC}">${rg}</div>
    <div style="font-size:9px;color:#69748a;margin-top:3px">slope ${pct6>=0?"+":""}${pct6.toFixed(2)}% · 6 barras</div>
  </div>
</div>
<div class="mo-sw">
  <div class="mo-swc"><h5>📊 Stochastic 15m · 14-3-3</h5>${stochHtml}</div>
  <div class="mo-swc"><h5>⚡ Divergência RSI 15m</h5>${divHtml}</div>
  <div class="mo-swc"><h5>📐 Fibonacci · Range 1h (50 velas)</h5>${fibHtml}</div>
</div>
<div class="mo-br">${briefHtml}</div>
<div class="mo-mac">
  <h5>📅 Contexto Macro</h5>
  <p><strong style="color:#f0b90b">${ST.macro.fedEvent||""}</strong>${ST.macro.headline?" · "+ST.macro.headline:""}</p>
  <p style="margin-top:6px">Fear &amp; Greed: <strong style="color:#3dd6f5">${ST.macro.fearGreed} · ${ST.macro.fearGreedLabel||""}</strong></p>
</div>`;
}

  const sr  = srFromCloses(closes);
  const rv  = rsi !== null ? rsi : "—";
  const rc  = rsi !== null ? rsiC(rsi) : C.neu;
  const rl  = rsi !== null ? rsiL(rsi) : "";
  const sc  = SIG[stat.signal] || SIG.AGUARDAR;
  const bbc = bubC(stat.bubble);
  const stars = Array.from({length:5}, (_,i) =>
    `<div style="width:6px;height:6px;border-radius:1px;background:${i<stat.structural?C.gold:"#1e1e1e"}"></div>`

    </div>

  <div style="height:42px;margin:0 -4px"><canvas id="sp-${id}" height="42"></canvas></div>

// MAIN FETCH
// ════════════════════════════════════════════════
async function fetchAll() {
  setStatus("Buscando preços (CoinGecko direto · Yahoo via proxy)...", "warn");
  try {
    // 1. Batch price (todos os cryptos)
    const cgIds = CRYPTO_CFG.map(c => c.cgId).join(",");
    const prices = await cgPrices(cgIds);

    // 2. Charts para RSI (paralelo com pequeno stagger p/ rate limit)
    const chartResults = await Promise.all(
      CRYPTO_CFG.map((c, i) => new Promise(res =>
        setTimeout(() => cgChart(c.cgId).then(res).catch(()=>res([])), i * 250)
      ))
    );

    // 3. Ações
    const stockResults = await Promise.allSettled(
      STOCK_CFG.map(c => yfStock(c.sym))
    );

    // Contagem de sinais
    const counts = {LONG:0,SHORT:0,AGUARDAR:0};
    [...CRYPTO_CFG.map(c=>c.id),...STOCK_CFG.map(c=>c.id)]
      .forEach(id => { const s = ST.assets[id]?.signal; if(s) counts[s]++; });

    const btcD   = prices["bitcoin"] || {};
    const btcP   = btcD.usd || 0;
    const btcChg = btcD.usd_24h_change || 0;
    const btcCC  = btcChg >= 0 ? C.g : C.r;
    const fgCol  = ST.macro.fearGreed <= 25 ? C.r : ST.macro.fearGreed <= 50 ? C.amb : C.g;
    const badges = Object.entries(counts).filter(([,n])=>n>0).map(([sig,n])=>{
      const s = SIG[sig];
      return `<span class="badge" style="color:${s.color};background:${s.bg};border-color:${s.bd}">${n} ${sig}</span>`;
    }).join("");

    // Monta cards cripto
    const cryptoHtml = CRYPTO_CFG.map((cfg, i) => {
      const p = prices[cfg.cgId] || {};
      return buildCard(cfg.id, cfg.name, cfg.lbl, cfg.color,
        p.usd||0, p.usd_24h_change||0,
        p.usd_24h_high||p.usd*1.01||0, p.usd_24h_low||p.usd*.99||0,
        p.usd_24h_vol||0, chartResults[i]||[], ST.assets[cfg.id]);
    }).join("");

    // Monta cards ações
    const stockHtml = STOCK_CFG.map((cfg, i) => {
      const res = stockResults[i];
      if (res.status === "rejected" || !res.value) {
        return `<div class="card skel"><span style="color:${C.r};font-size:10px">⚠ ${cfg.name}: erro</span></div>`;
      }
      const d = res.value;
      return buildCard(cfg.id, cfg.name, cfg.lbl, cfg.color,
        d.price, d.change, d.high24, d.low24, 0, d.closes, ST.assets[cfg.id]);
    }).join("");

    // Injeta tudo
    document.getElementById("app").innerHTML = `
<div class="hd">
  <div class="brand">
    <div class="bbar"></div>
    <div>
      <span style="font-size:14px;font-weight:800;color:${C.gold};letter-spacing:.1em">MARQUES INVEST</span>
      <span style="font-size:10px;color:var(--txt2)"> · Swing Trade · Bybit + NYSE</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end">
    ${badges}
    <div style="text-align:right">
      <div style="font-size:8px;color:var(--txt2)">Atualizado: ${nowStr()}</div>
      <div id="cdwrap"></div>
    </div>
  </div>
</div>
<div class="macro">
  <div class="mrow">
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:8px;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em">BTC</span>
      <span style="font-size:11px;font-weight:700">$${btcP.toLocaleString("en-US",{maximumFractionDigits:0})}</span>
      <span style="font-size:11px;font-weight:700;color:${btcCC}">${btcChg>=0?"+":""}${btcChg.toFixed(2)}%</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:8px;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em">Dom.</span>
      <span style="font-size:11px;font-weight:700;color:${C.amb}">~58.9%</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:8px;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em">Fear &amp; Greed</span>
      <span style="font-size:11px;font-weight:700;color:${fgCol}">${ST.macro.fearGreed} · ${ST.macro.fearGreedLabel}</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:8px;color:${C.amb}">📅 ${ST.macro.fedEvent}</span>
    </div>
  </div>
  <p style="font-size:10px;color:var(--txt2);line-height:1.55">⚠ ${ST.macro.headline}</p>
</div>
<div class="tabs">
  <button class="tab on" id="tab-c" onclick="switchTab('crypto')">🔷 Cripto (6) · Bybit</button>
  <button class="tab" id="tab-s" onclick="switchTab('stocks')">📈 Ações Tech (6) · NYSE</button>
</div>
<div class="grid" id="gc">${cryptoHtml}</div>
<div class="grid" id="gs" style="display:none">${stockHtml}</div>
<div class="ft">
  <div style="display:flex;align-items:center;gap:6px">
    <div class="sdot" id="sdot"></div>
    <span style="font-size:8px;color:var(--txt2)">12 ativos · CoinGecko + Yahoo Finance · auto-refresh 5 min</span>
  </div>
  <span style="font-size:8px;color:${C.gold};opacity:.7;letter-spacing:.06em">
    MARQUES INVEST · <span style="color:var(--txt2)">fins analíticos</span>
  </span>
</div>`;

    // Sparklines
    CRYPTO_CFG.forEach((cfg, i) => {
      const chg = (prices[cfg.cgId]?.usd_24h_change || 0);
      drawSpark(cfg.id, chartResults[i] || [], chg >= 0 ? C.g : C.r);
    });
    STOCK_CFG.forEach((cfg, i) => {
      const res = stockResults[i];
      if (res.status === "fulfilled" && res.value)
        drawSpark(cfg.id, res.value.closes, res.value.change >= 0 ? C.g : C.r);
    });

    setStatus("✓ Dados ao vivo · CoinGecko direto + Yahoo Finance via proxy", "ok");
    countdown = 300;

  } catch(e) {
    console.error("fetchAll falhou:", e);
    setStatus("✗ Falha ao carregar — Brave/Firefox: desative Shields para este site (🦁 → desativar). Retry em 60s.", "err");
    countdown = 60;
  }
}

// ════════════════════════════════════════════════
// TIMER
// ════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", () => {
  fetchAll();
  setInterval(() => {
    countdown--;
    updateCd();
    if (countdown <= 0) fetchAll();
  }, 1000);
});
</script>

  <div class="mo-box">
    <div class="mo-hdr">
      <div style="width:10px;height:10px;border-radius:50%;flex-shrink:0" id="mo-dot"></div>
      <div><div class="mo-nm" id="mo-nm">—</div><div class="mo-lb" id="mo-lb"></div></div>
      <span class="mo-pr" id="mo-pr">—</span>
      <span class="mo-cg" id="mo-cg"></span>
      <div id="mo-sig" style="margin-left:6px"></div>
      <button class="mo-close" onclick="closeModal()" title="Fechar (Esc)">✕</button>
    </div>
    <div class="mo-body" id="mo-body">
      <div class="mo-ld">⟳ Calculando métricas ao vivo...</div>
    </div>
  </div>
</div></body>
</html>
